version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: legal_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legal_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - legal_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: legal_ai_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - legal_ai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_ai_api
    env_file: .env
    volumes:
      - ./rag_docs:/app/rag_docs
    networks:
      - legal_ai_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`)"
      - "traefik.http.routers.api.entrypoints=web"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_ai_celery
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./rag_docs:/app/rag_docs
    env_file: .env
    networks:
      - legal_ai_network
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_ai_beat
    command: celery -A app.celery_app beat --loglevel=info
    volumes:
      - ./rag_docs:/app/rag_docs
    env_file: .env
    networks:
      - legal_ai_network
    depends_on:
      - redis
      - db
    restart: unless-stopped

  flower:
    image: mher/flower:latest
    container_name: legal_ai_flower
    command: celery -A app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    networks:
      - legal_ai_network
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped

  traefik:
    image: traefik:v2.10
    container_name: legal_ai_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
      - "5555:5555"  # Flower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - legal_ai_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  legal_ai_network:
    driver: bridge
